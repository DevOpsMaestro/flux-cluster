---
# HTTPProxy is Contour's own routing CRD (projectcontour.io/v1). It serves the
# same role as Gateway API's HTTPRoute but uses Contour's vocabulary. This
# resource lives in the demo namespace so it co-locates with the httpbin Service
# it routes to — the same pattern used by Envoy Gateway's HTTPRoutes in the
# observability namespace.
#
# Traffic path:
#   localhost:8080 → KinD → nginx (httpbin-contour.local) → envoy.contour:80
#   → Contour Envoy data plane → HTTPProxy match → httpbin.demo:80
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: httpbin
  namespace: demo
spec:
  virtualhost:
    fqdn: httpbin-contour.local
  routes:
    - conditions:
        - prefix: /
      services:
        - name: httpbin
          port: 80
