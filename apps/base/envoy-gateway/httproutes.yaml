---
# HTTPRoute — Grafana
# Accessible at http://grafana.local:8080 via the 'main' Gateway in envoy-ingress.
# Requires /etc/hosts entry: 127.0.0.1 grafana.local
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
spec:
  parentRefs:
    - name: main
      namespace: envoy-ingress
      sectionName: http
  hostnames:
    - "grafana.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: observability-grafana
          port: 80
---
# HTTPRoute — Prometheus
# Accessible at http://prometheus.local:8080 via the 'main' Gateway in envoy-ingress.
# Requires /etc/hosts entry: 127.0.0.1 prometheus.local
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: observability
spec:
  parentRefs:
    - name: main
      namespace: envoy-ingress
      sectionName: http
  hostnames:
    - "prometheus.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: observability-kube-prometh-prometheus
          port: 9090
