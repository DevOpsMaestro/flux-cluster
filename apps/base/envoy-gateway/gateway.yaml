---
# GatewayClass — the Envoy Gateway Helm chart installs the controller only;
# the GatewayClass object must be created separately. The controller watches
# for GatewayClasses whose controllerName matches its own identifier and marks
# them Accepted before provisioning any Gateway data-planes.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
# EnvoyProxy configures the data-plane Envoy Deployment and Service that Envoy
# Gateway auto-provisions when a Gateway CR references it via infrastructure.parametersRef.
#
# type: NodePort — required for KinD, which has no cloud load-balancer controller.
# A LoadBalancer Service stays Pending indefinitely; NodePort is immediately usable.
#
# The patch sets nodePort: 30080 so the value is deterministic and matches the
# KinD extraPortMapping (containerPort: 30080 → hostPort: 8080).
#
# targetPort for an HTTP listener on port 80 is 10080 — Envoy Gateway's convention.
# The patch uses MergeWithOverwrite; Kubernetes strategic-merge uses 'name' as the
# merge key for Service.spec.ports, so only the named port is updated.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: kindconfig
  namespace: envoy-ingress
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        patch:
          value:
            spec:
              ports:
                - name: http-80
                  port: 80
                  protocol: TCP
                  targetPort: 10080
                  nodePort: 30080
      envoyDeployment:
        container:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        # The shutdown-manager sidecar is injected by the controller and has no
        # dedicated EnvoyProxy field. A strategic-merge patch is the only way to
        # set its resource limits; without this the sidecar fails the Kyverno
        # require-resource-limits policy at admission and blocks pod restarts.
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                    - name: shutdown-manager
                      resources:
                        requests:
                          cpu: 10m
                          memory: 32Mi
                        limits:
                          cpu: 50m
                          memory: 64Mi
---
# Gateway CR — Envoy Gateway auto-provisions the Envoy Deployment + Service in this
# namespace when it sees gatewayClassName: eg. The infrastructure.parametersRef
# wires the NodePort configuration above.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: envoy-ingress
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: kindconfig
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
