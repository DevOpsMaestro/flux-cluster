---
# Stable ClusterIP Service for the Envoy Gateway data-plane proxy.
#
# Envoy Gateway auto-provisions a Service named envoy-<namespace>-<gateway>-<uid-hash>
# whose name changes every cluster rebuild. The nginx nodeport-proxy needs a
# fixed DNS name to proxy_pass to, so this Service provides one by selecting
# the same pods via labels that ARE stable across rebuilds.
apiVersion: v1
kind: Service
metadata:
  name: envoy-proxy
  namespace: envoy-gateway-system
spec:
  selector:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    gateway.envoyproxy.io/owning-gateway-name: main
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-ingress
  ports:
    - name: http
      port: 80
      targetPort: 10080
