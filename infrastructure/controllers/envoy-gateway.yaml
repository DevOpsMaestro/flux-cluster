---
# Envoy Gateway controller runs in envoy-gateway-system.
# Injection disabled: the controller pods are not part of the Istio mesh.
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-gateway-system
  labels:
    istio-injection: disabled
---
# Envoy Gateway data-plane (auto-provisioned Envoy proxy pods) runs in envoy-ingress.
# Injection disabled: Envoy Gateway manages its own Envoy proxies; Istio sidecar
# injection would conflict with the gateway container lifecycle.
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-ingress
  labels:
    istio-injection: disabled
---
# Envoy Gateway installs its own CRDs (EnvoyProxy, GatewayClass, BackendTrafficPolicy,
# etc.) via the Helm chart. The Gateway API CRDs (Gateway, HTTPRoute, GatewayClass) are
# installed by the setup script (step 4) before Flux bootstrap, so they exist when this
# HelmRelease first reconciles.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: envoy-gateway-system
  dependsOn:
    - name: cilium
      namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: gateway-helm
      version: "1.4.x"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 24h
  values:
    # Disable the certgen Job's HPA — KinD has no Metrics Server.
    autoscaling:
      enabled: false
    deployment:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
---
# ── envoy-gateway-system (controller) ────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Envoy Gateway controller watches Gateway, HTTPRoute, and related CRDs cluster-wide.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# The controller pushes xDS configuration to Envoy proxy pods in envoy-ingress
# on port 18000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-xds-egress-to-envoy-ingress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-ingress
      ports:
        - port: 18000
---
# ── envoy-ingress (data-plane Envoy proxy pods) ───────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# External HTTP/HTTPS traffic arrives via KinD NodePort.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
        - port: 8443
---
# Envoy proxy receives xDS configuration from the controller.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-xds-ingress-from-controller
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 18000
---
# Envoy proxies route traffic to backend services in the observability namespace
# (Grafana :3000, Prometheus :9090).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-observability
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 3000
        - port: 9090
