---
# Envoy Gateway controller runs in envoy-gateway-system.
# Injection disabled: the controller pods are not part of the Istio mesh.
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-gateway-system
  labels:
    istio-injection: disabled
---
# envoy-ingress holds only the nginx nodeport-proxy DaemonSet (KinD port-mapping shim).
# Envoy Gateway auto-provisions the data-plane proxy pod in envoy-gateway-system (1.4.x).
# Injection disabled: Envoy Gateway manages its own Envoy proxies; Istio sidecar
# injection would conflict with the gateway container lifecycle.
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-ingress
  labels:
    istio-injection: disabled
---
# Envoy Gateway installs its own CRDs (EnvoyProxy, GatewayClass, BackendTrafficPolicy,
# etc.) via the Helm chart. The Gateway API CRDs (Gateway, HTTPRoute, GatewayClass) are
# installed by the setup script (step 4) before Flux bootstrap, so they exist when this
# HelmRelease first reconciles.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: envoy-gateway-system
  dependsOn:
    - name: cilium
      namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: gateway-helm
      version: "1.4.x"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 24h
  values:
    # Disable the certgen Job's HPA — KinD has no Metrics Server.
    autoscaling:
      enabled: false
    deployment:
      # Chart key is deployment.envoyGateway.resources (not deployment.resources).
      # The bare deployment.resources path is silently ignored by the chart.
      envoyGateway:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
# ── envoy-gateway-system (controller) ────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Envoy Gateway controller watches Gateway, HTTPRoute, and related CRDs cluster-wide.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: envoy-gateway-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# The nodeport-proxy (envoy-ingress) uses hostNetwork: true, so its traffic originates
# from the node IP rather than a pod CIDR. Standard NetworkPolicy cannot express "from
# host entity", so we allow all sources on the Envoy proxy's HTTP listen port. Port
# 10080 is only reachable inside the cluster, limiting the exposure.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxy-http-ingress
  namespace: envoy-gateway-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: proxy
      app.kubernetes.io/managed-by: envoy-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 10080
---
# Envoy proxy pods (in envoy-gateway-system) route HTTP traffic to backend services.
# Ports are pod ports: Cilium's socket-level DNAT translates Service port 80 → pod
# port 3000 before egress NetworkPolicy is evaluated.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxy-egress-to-backends
  namespace: envoy-gateway-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: proxy
      app.kubernetes.io/managed-by: envoy-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 3000
        - port: 9090
---
# ── envoy-ingress (nginx nodeport-proxy DaemonSet only) ──────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# External HTTP/HTTPS traffic arrives via KinD NodePort.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
        - port: 8443
