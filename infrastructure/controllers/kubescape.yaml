---
apiVersion: v1
kind: Namespace
metadata:
  name: kubescape
  labels:
    istio-injection: disabled
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubescape
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: kubescape-operator
      version: "1.40.x"
      sourceRef:
        kind: HelmRepository
        name: kubescape
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: cilium
      namespace: flux-system
  targetNamespace: kubescape
  values:
    clusterName: flux-kind
    capabilities:
      configurationScan: enable
      continuousScan: enable
      prometheusExporter: enable
      vulnerabilityScan: disable
      nodeScan: disable
      nodeSbomGeneration: disable
      relevancy: disable
      runtimeObservability: disable
      networkPolicyService: disable
      networkEventsStreaming: disable
      nodeProfileService: disable
      admissionController: disable
      httpDetection: disable
      seccompProfileService: disable
    configurations:
      prometheusAnnotations: disable
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Kubescape reads all resources across every namespace for posture scanning.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
---
# Kubescape connects to ARMO cloud to pull compliance frameworks and upload scan
# results. Allow HTTPS egress cluster-wide; no practical destination restriction.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Prometheus scrapes Kubescape metrics on port 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubescape-allow-prometheus-scrape-ingress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 8080
